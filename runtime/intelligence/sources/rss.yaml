platform: rss
mode: public

categories:
  ai:
    feeds:
      - name: "openai_news"
        url: "https://openai.com/news/rss.xml"
        enabled: true
        reason: "Official OpenAI product and research updates"
        limit: 5

      - name: "deepmind_blog"
        url: "https://deepmind.google/blog/rss.xml"
        enabled: true
        reason: "Official DeepMind updates on model, research, and deployment direction"
        limit: 4

      - name: "google_research"
        url: "https://research.google/blog/rss/"
        enabled: true
        reason: "Official Google Research engineering and model work with practical relevance"
        limit: 3

      - name: "interconnects"
        url: "https://www.interconnects.ai/feed"
        enabled: true
        reason: "High-signal AI systems, model ecosystems, and open-model analysis"
        limit: 3

      - name: "simon_willison"
        url: "https://simonwillison.net/atom/everything/"
        enabled: true
        reason: "Practical LLM, tooling, and AI product analysis"
        limit: 3

      - name: "latent_space"
        url: "https://www.latent.space/feed"
        enabled: true
        reason: "High-signal AI engineering and product strategy analysis"
        limit: 3

  career:
    feeds: []

limits:
  default_per_feed: 5
