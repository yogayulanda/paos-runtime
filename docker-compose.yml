services:
  mnemosyne:
    container_name: paos-mnemosyne
    restart: unless-stopped
    image: alpine
    command: tail -f /dev/null
    env_file:
      - .env
    volumes:
      - ./data:/data
      - ../personal-context:/workspace/personal-context

  hermes:
    container_name: paos-hermes
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/hermes/Dockerfile.hermes-paos
    image: paos-hermes-agent:local
    command: sleep infinity
    env_file:
      - .env
    volumes:
      - ./data/hermes:/opt/data
      - ./:/workspace/paos-runtime:ro
      - ../personal-context:/workspace/personal-context
